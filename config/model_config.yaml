model:
  type: lightgbm

lightgbm:
  objective: binary
  metric: auc
  boosting_type: gbdt
  learning_rate: 0.05
  n_estimators: 300
  num_leaves: 31
  max_depth: -1
  subsample: 0.85
  colsample_bytree: 0.85
  reg_alpha: 0.0
  reg_lambda: 2.0
  random_state: 42
  n_jobs: -1
  class_weight: balanced

xgboost:
  objective: binary:logistic
  eval_metric: aucpr
  learning_rate: 0.05
  n_estimators: 300
  max_depth: 5
  min_child_weight: 3
  subsample: 0.85
  colsample_bytree: 0.85
  reg_alpha: 0.0
  reg_lambda: 2.0
  random_state: 42
  n_jobs: -1
  tree_method: hist
  scale_pos_weight: 1.0

training:
  threshold: 0.5
  cv_folds: 3
  log_model: true
