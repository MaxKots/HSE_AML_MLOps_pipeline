services:
  postgres:
    image: postgres:15
    container_name: aml_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: aml_user
      POSTGRES_PASSWORD: aml_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio:latest
    container_name: aml_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mlflow:
    image: python:3.10-slim
    container_name: aml_mlflow
    # user: "${UID}:${GID}"
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./:/app
    command: >
      bash -lc 'pip install mlflow==2.17.0 boto3 psycopg2-binary &&
      python -c "import socket,time; [socket.create_connection((\"postgres\",5432),2).close() or exit() for _ in range(60) if not time.sleep(2)]" &&
      mlflow server
      --backend-store-uri postgresql://aml_user:aml_password@postgres:5432/mlflow
      --default-artifact-root ./mlruns
      --host 0.0.0.0
      --port 5000'
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aml_api
    user: "${UID}:${GID}"
    working_dir: /app
    restart: unless-stopped
    command: python scripts/run_api.py
    volumes:
      - ./:/app
    environment:
      APP_ENV: docker
      APP_NAME: aml-pipeline
      DATA_RAW_DIR: data/raw
      DATA_PROCESSED_DIR: data/processed
      DATA_REFERENCE_DIR: data/reference
      ARTIFACTS_DIR: artifacts
      BASE_DATASET_PATH: data/raw/Base.csv
      DRIFT_DATASET_PATH_1: data/raw/Variant I.csv
      DRIFT_DATASET_PATH_2: data/raw/Variant II.csv
      TARGET_COLUMN: fraud_bool
      RANDOM_SEED: 42
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: aml_detection
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DASHBOARD_API_URL: http://api:8000
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      - mlflow

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aml_dashboard
    user: "${UID}:${GID}"
    working_dir: /app
    restart: unless-stopped
    command: python scripts/run_dashboard.py
    volumes:
      - ./:/app
    environment:
      APP_ENV: docker
      APP_NAME: aml-pipeline
      DATA_RAW_DIR: data/raw
      DATA_PROCESSED_DIR: data/processed
      DATA_REFERENCE_DIR: data/reference
      ARTIFACTS_DIR: artifacts
      BASE_DATASET_PATH: data/raw/Base.csv
      DRIFT_DATASET_PATH_1: data/raw/Variant I.csv
      DRIFT_DATASET_PATH_2: data/raw/Variant II.csv
      TARGET_COLUMN: fraud_bool
      RANDOM_SEED: 42
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DASHBOARD_API_URL: http://api:8000
      PYTHONPATH: /app
    ports:
      - "8501:8501"
    depends_on:
      - api

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: aml_airflow_init
    user: "${AIRFLOW_UID}:0"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://aml_user:aml_password@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_HOME: /opt/airflow
      PYTHONPATH: /opt/project
      APP_ENV: docker
      APP_NAME: aml-pipeline
      DATA_RAW_DIR: data/raw
      DATA_PROCESSED_DIR: data/processed
      DATA_REFERENCE_DIR: data/reference
      ARTIFACTS_DIR: artifacts
      BASE_DATASET_PATH: data/raw/Base.csv
      DRIFT_DATASET_PATH_1: data/raw/Variant I.csv
      DRIFT_DATASET_PATH_2: data/raw/Variant II.csv
      TARGET_COLUMN: fraud_bool
      RANDOM_SEED: 42
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: aml_detection
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./src:/opt/project/src
      - ./config:/opt/project/config
      - ./scripts:/opt/project/scripts
      - ./data:/opt/project/data
      - ./artifacts:/opt/project/artifacts
      - ./.env:/opt/project/.env
    command: >
      bash -lc 'airflow db migrate &&
      airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com || true'
    depends_on:
      - postgres
      - mlflow

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: aml_airflow_webserver
    user: "${AIRFLOW_UID}:0"
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://aml_user:aml_password@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: aml_secret_key
      AIRFLOW_HOME: /opt/airflow
      PYTHONPATH: /opt/project
      APP_ENV: docker
      APP_NAME: aml-pipeline
      DATA_RAW_DIR: data/raw
      DATA_PROCESSED_DIR: data/processed
      DATA_REFERENCE_DIR: data/reference
      ARTIFACTS_DIR: artifacts
      BASE_DATASET_PATH: data/raw/Base.csv
      DRIFT_DATASET_PATH_1: data/raw/Variant I.csv
      DRIFT_DATASET_PATH_2: data/raw/Variant II.csv
      TARGET_COLUMN: fraud_bool
      RANDOM_SEED: 42
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: aml_detection
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./src:/opt/project/src
      - ./config:/opt/project/config
      - ./scripts:/opt/project/scripts
      - ./data:/opt/project/data
      - ./artifacts:/opt/project/artifacts
      - ./.env:/opt/project/.env
    command: airflow webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: aml_airflow_scheduler
    user: "${AIRFLOW_UID}:0"
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://aml_user:aml_password@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_HOME: /opt/airflow
      PYTHONPATH: /opt/project
      APP_ENV: docker
      APP_NAME: aml-pipeline
      DATA_RAW_DIR: data/raw
      DATA_PROCESSED_DIR: data/processed
      DATA_REFERENCE_DIR: data/reference
      ARTIFACTS_DIR: artifacts
      BASE_DATASET_PATH: data/raw/Base.csv
      DRIFT_DATASET_PATH_1: data/raw/Variant I.csv
      DRIFT_DATASET_PATH_2: data/raw/Variant II.csv
      TARGET_COLUMN: fraud_bool
      RANDOM_SEED: 42
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: aml_detection
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./src:/opt/project/src
      - ./config:/opt/project/config
      - ./scripts:/opt/project/scripts
      - ./data:/opt/project/data
      - ./artifacts:/opt/project/artifacts
      - ./.env:/opt/project/.env
    command: airflow scheduler
    depends_on:
      - airflow-init

volumes:
  postgres_data:
  minio_data:
